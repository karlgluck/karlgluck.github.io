<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
    <style type="text/css">
       html {
        box-sizing: border-box;
        font-size: 16px;
       }
       *, *:before, *:after {
        box-sizing: inherit;
       } 
       body {
           padding: 0;
           margin: 1em 0 0 0;
       }
       .centered {
        margin: 0 auto;
        padding: 0;
        width: 30em;
       }
       @media (max-width: 31em) {
            .centered {
                margin: 0em 0.5em;
                width: auto;
            }
       }
        input, button {
            border-radius: 0;
            width: 100%;
            padding: 1.5em;
            border: 1px solid black;
        }
        select {
            border-radius: 0;
            border: 1px solid black;
        }
        .copybox-div {
            display: table;
        }
        .copybox-input {
            display: table-cell;
            border-right: none;
        }
        .copybox-span {
            display: table-cell;
            width: 1%;
            min-width: 4em;
        }
    </style>
    <script>
    (function () {
        var t;
        if (!location.href.startsWith("http")) { return; }
        window.onload = resetTimer;
        document.onmousemove = resetTimer;
        document.onkeypress = resetTimer;
        function logout() { $('html').html(''); location.reload (true); }
        function resetTimer() { clearTimeout(t); t = setTimeout(logout, 120000) }
    })();

    </script>
  </head>
  <body>
    <form id="unlock" class="centered">
    <p><input type="password" id="key" /></p>
    <p><button type="submit">Submit</button></p>
    </form>
    <script type="text/javascript">
      $(document).ready(function(){ $('#key').focus(); });
      var getPassphrase = function () {};
      $('#unlock').on('submit', function () {
        getPassphrase = (function (val) { return function () { return val } })($('#key').val());
        $('body').html(CryptoJS.enc.Utf8.stringify(CryptoJS.AES.decrypt($("meta[name='content']").attr('content'),getPassphrase() + window.location.hash)));
        return false;
      });
    </script>
